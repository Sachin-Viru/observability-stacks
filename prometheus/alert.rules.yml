groups:
- name: system-alerts
  rules:
  - alert: HighLoad
    expr: node_load1 > 5
    for: 2m
    labels:
      severity: warning
    annotations:
      summary: "High system load on {{ $labels.instance }}"
      description: "1m load average is {{ $value }} on {{ $labels.instance }}"

  - alert: HighCPU
    expr: 100 - (avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[1m])) * 100) > 80
    for: 2m
    labels:
      severity: warning
    annotations:
      summary: "High CPU on {{ $labels.instance }}"
      description: "CPU at {{ printf \"%.1f\" $value }}% on {{ $labels.instance }}"

  - alert: HighMemory
    expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
    for: 2m
    labels:
      severity: warning
    annotations:
      summary: "High memory on {{ $labels.instance }}"
      description: "Memory at {{ printf \"%.1f\" $value }}% on {{ $labels.instance }}"

  - alert: DiskSpaceLow
    expr: (1 - (node_filesystem_avail_bytes{fstype!="tmpfs"} / node_filesystem_size_bytes{fstype!="tmpfs"})) * 100 > 80
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "Disk space low on {{ $labels.instance }}"
      description: "Disk {{ $labels.mountpoint }} at {{ printf \"%.1f\" $value }}%"

- name: target-alerts
  rules:
  - alert: NodeDown
    expr: up == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "Target DOWN: {{ $labels.instance }}"
      description: "Job '{{ $labels.job }}' target {{ $labels.instance }} is unreachable"

  - alert: UrlMiniDown
    expr: up{job="url-mini"} == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "url-mini service is DOWN"
      description: "url-mini on {{ $labels.instance }} has been down for >1 minute"

  - alert: JenkinsDown
    expr: up{job="jenkins"} == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "Jenkins is DOWN"
      description: "Jenkins at {{ $labels.instance }} is unreachable"

- name: jenkins-alerts
  rules:
  - alert: JenkinsHighBuildDuration
    expr: jenkins_builds_duration_milliseconds_summary{quantile="0.99"} > 300000
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "Jenkins builds taking too long"
      description: "99th percentile build time exceeds 5 minutes"

- name: service-alerts
  rules:

  - alert: ServiceDown
    expr: node_systemd_unit_state{state="active"} == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "Service DOWN: {{ $labels.name }}"
      description: "{{ $labels.name }} on {{ $labels.instance }} is not active"

  - alert: ServiceFailed
    expr: node_systemd_unit_state{state="failed"} == 1
    for: 30s
    labels:
      severity: critical
    annotations:
      summary: "Service FAILED: {{ $labels.name }}"
      description: "{{ $labels.name }} on {{ $labels.instance }} has failed"      
