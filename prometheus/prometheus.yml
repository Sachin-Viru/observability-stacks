global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

alerting:
  alertmanagers:
  - static_configs:
      - targets:
          - "alertmanager:9093"
    scheme: http
    timeout: 10s
    api_version: v2

rule_files:
  - "alert.rules.yml"
  - "black-alert.rules.yml" 

scrape_configs:
- job_name: prometheus
  honor_timestamps: true
  scrape_interval: 15s
  scrape_timeout: 10s
  metrics_path: /metrics
  scheme: http
  static_configs:
  - targets:
    - prometheus:9090

- job_name: sachin
  static_configs:
  - targets: ['node_exporter:9100']

- job_name: url-mini
  static_configs:
  - targets: ['url-mini:5000']

- job_name: jenkins
  metrics_path: /prometheus
  static_configs:
  - targets: ['10.218.65.150:8080']


- job_name: 'blackbox-http'
  metrics_path: /probe
  params:
    module: [http_2xx]

  static_configs:
    - targets:
      - https://github.com
      - https://google.com
      - https://this-site-sachin.com
  relabel_configs:
    - source_labels: [__address__]
      target_label: __param_target

    - source_labels: [__param_target]
      target_label: instance

    - target_label: __address__
      replacement: blackbox_exporter:9115  
